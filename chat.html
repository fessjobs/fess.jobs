<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#E8651A">
<link rel="manifest" href="manifest.json">
<title>FESS Chat</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bitter:wght@700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--or:#E8651A;--font:'Barlow',sans-serif;--bg:#f0f2f5}
body{background:var(--bg);font-family:var(--font);height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
/* HEADER */
.chat-header{background:#fff;border-bottom:1px solid #e5e7eb;padding:0 16px;height:56px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;flex-shrink:0;padding-top:env(safe-area-inset-top)}
.back-btn{background:none;border:none;color:var(--or);font-size:22px;cursor:pointer;padding:4px;display:flex;align-items:center}
.chat-avatar{width:38px;height:38px;border-radius:50%;background:var(--or);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.chat-info{flex:1;min-width:0}
.chat-name{font-family:'Bitter',serif;font-weight:800;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-members{font-size:11px;color:#6b7280}
.header-actions{display:flex;gap:8px}
.hbtn{background:none;border:none;cursor:pointer;padding:6px;border-radius:8px;color:#6b7280;font-size:18px}
.hbtn:hover{background:#f3f4f6;color:#111827}
/* PINNED */
.pinned-bar{background:#fff8f5;border-bottom:2px solid var(--or);padding:8px 16px;display:none;cursor:pointer}
.pinned-bar.show{display:flex;align-items:center;gap:8px}
.pinned-icon{color:var(--or);font-size:14px}
.pinned-text{font-size:12px;color:#374151;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* MESSAGES */
.msgs-wrap{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:6px;-webkit-overflow-scrolling:touch}
/* Message */
.msg-row{display:flex;gap:8px;align-items:flex-end;max-width:100%}
.msg-row.own{flex-direction:row-reverse}
.msg-avatar{width:28px;height:28px;border-radius:50%;background:#e5e7eb;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#6b7280;flex-shrink:0}
.msg-bubble{max-width:72%;padding:8px 12px;border-radius:16px;font-size:13px;line-height:1.45;position:relative;word-break:break-word}
.msg-bubble.other{background:#fff;border:1px solid #e5e7eb;border-bottom-left-radius:4px;color:#111827}
.msg-bubble.own{background:var(--or);color:#fff;border-bottom-right-radius:4px}
.msg-bubble.admin-msg{background:#1e2433;color:#fff;border-bottom-left-radius:4px}
.msg-sender{font-size:10px;font-weight:700;color:var(--or);margin-bottom:3px}
.msg-time{font-size:9px;opacity:.6;margin-top:3px;text-align:right}
.msg-attachment{display:flex;align-items:center;gap:8px;background:rgba(0,0,0,.08);border-radius:8px;padding:7px 10px;margin-top:6px;cursor:pointer;text-decoration:none;color:inherit}
.msg-att-icon{font-size:20px;flex-shrink:0}
.msg-att-name{font-size:11px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.msg-att-size{font-size:10px;opacity:.7}
.pin-badge{position:absolute;top:-6px;right:-6px;background:var(--or);color:#fff;border-radius:10px;padding:1px 5px;font-size:9px;font-weight:700}
.msg-actions{opacity:0;position:absolute;top:50%;transform:translateY(-50%);display:flex;gap:4px;transition:opacity .15s}
.msg-row:hover .msg-actions{opacity:1}
.msg-row.own .msg-actions{left:-70px}
.msg-row:not(.own) .msg-actions{right:-70px}
.mac{background:#fff;border:1px solid #e5e7eb;border-radius:6px;padding:3px 7px;font-size:11px;cursor:pointer;white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.mac:hover{background:#f3f4f6}
/* Date divider */
.date-div{text-align:center;margin:8px 0}
.date-div span{background:#e5e7eb;color:#6b7280;font-size:10px;font-weight:600;padding:3px 10px;border-radius:10px}
/* INPUT */
.input-wrap{background:#fff;border-top:1px solid #e5e7eb;padding:10px 12px;padding-bottom:max(10px, env(safe-area-inset-bottom));flex-shrink:0}
.reply-preview{background:#fff8f5;border-left:3px solid var(--or);padding:6px 10px;border-radius:6px;margin-bottom:6px;display:none;font-size:11px;color:#374151}
.reply-preview.show{display:flex;align-items:center;justify-content:space-between;gap:8px}
.input-row{display:flex;align-items:flex-end;gap:8px}
.attach-btn,.send-btn,.sign-btn{width:38px;height:38px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.attach-btn{background:#f3f4f6;color:#6b7280}
.attach-btn:hover{background:#e5e7eb}
.sign-btn{background:#f3f4f6;color:var(--or)}
.send-btn{background:var(--or);color:#fff}
.send-btn:hover{background:#d4580f}
.msg-input{flex:1;background:#f9fafb;border:1.5px solid #e5e7eb;border-radius:20px;padding:9px 14px;font-family:var(--font);font-size:14px;outline:none;resize:none;max-height:120px;min-height:38px;transition:border-color .15s;line-height:1.4}
.msg-input:focus{border-color:var(--or)}
/* MEMBERS PANEL */
.members-panel{position:fixed;right:0;top:0;bottom:0;width:280px;background:#fff;border-left:1px solid #e5e7eb;transform:translateX(100%);transition:transform .25s;z-index:200;overflow-y:auto;padding:16px}
.members-panel.open{transform:translateX(0)}
.members-title{font-family:'Bitter',serif;font-weight:800;font-size:15px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.member-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f3f4f6}
.member-ava{width:34px;height:34px;border-radius:50%;background:var(--or);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.member-name{font-size:13px;font-weight:600;color:#111827}
.member-role{font-size:10px;color:#6b7280}
.online-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;flex-shrink:0;margin-left:auto}
/* SIGNATURE MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-bg.open{opacity:1;pointer-events:all}
.modal-box{background:#fff;border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:500px;transform:translateY(20px);transition:transform .2s}
.modal-bg.open .modal-box{transform:translateY(0)}
.modal-title{font-family:'Bitter',serif;font-weight:800;font-size:17px;margin-bottom:4px}
.modal-sub{font-size:12px;color:#6b7280;margin-bottom:14px}
.sig-canvas{width:100%;height:120px;border:1.5px solid #e5e7eb;border-radius:10px;cursor:crosshair;touch-action:none;background:#f9fafb}
.btn-row{display:flex;gap:8px;margin-top:12px}
.btn{padding:10px 20px;border-radius:8px;font-family:'Bitter',serif;font-weight:700;font-size:13px;cursor:pointer;border:none;flex:1}
.b-or{background:var(--or);color:#fff}
.b-gh{background:#f3f4f6;color:#374151}
/* File input */
#fileInput{display:none}
/* Empty state */
.empty-chat{text-align:center;padding:40px 20px;color:#9ca3af}
.empty-chat .ei{font-size:48px;margin-bottom:12px}
.empty-chat p{font-size:13px;line-height:1.6}
/* Toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1f2937;color:#fff;padding:9px 18px;border-radius:20px;font-size:12px;font-weight:600;z-index:999;pointer-events:none}
</style>
</head>
<body>

<div class="chat-header">
  <button class="back-btn" onclick="history.back()">←</button>
  <div class="chat-avatar" id="chatAvatar">🎪</div>
  <div class="chat-info">
    <div class="chat-name" id="chatName">Laden…</div>
    <div class="chat-members" id="chatMembersCount">0 Mitglieder</div>
  </div>
  <div class="header-actions">
    <button class="hbtn" onclick="toggleMembers()" title="Mitglieder">👥</button>
    <button class="hbtn" onclick="showPinnedMessages()" title="Gepinnte Nachrichten">📌</button>
  </div>
</div>

<div class="pinned-bar" id="pinnedBar">
  <span class="pinned-icon">📌</span>
  <span class="pinned-text" id="pinnedText">Keine gepinnten Nachrichten</span>
</div>

<div class="msgs-wrap" id="msgsWrap">
  <div class="empty-chat">
    <div class="ei">💬</div>
    <p>Noch keine Nachrichten.<br>Schreib die erste!</p>
  </div>
</div>

<div class="input-wrap">
  <div class="reply-preview" id="replyPreview">
    <span id="replyText"></span>
    <button onclick="clearReply()" style="background:none;border:none;cursor:pointer;color:#6b7280;font-size:16px">✕</button>
  </div>
  <div class="input-row">
    <button class="attach-btn" onclick="document.getElementById('fileInput').click()" title="Anhang">📎</button>
    <button class="sign-btn" onclick="openSigModal()" title="Unterschreiben">✍️</button>
    <textarea class="msg-input" id="msgInput" placeholder="Nachricht…" rows="1"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"></textarea>
    <button class="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<input type="file" id="fileInput" accept="*/*" onchange="handleFileSelect(event)">

<!-- MEMBERS PANEL -->
<div class="members-panel" id="membersPanel">
  <div class="members-title">
    Mitglieder
    <button onclick="toggleMembers()" style="background:none;border:none;cursor:pointer;font-size:18px;color:#6b7280">✕</button>
  </div>
  <div id="membersList"></div>
</div>

<!-- SIGNATURE MODAL -->
<div class="modal-bg" id="sigModal">
  <div class="modal-box">
    <div class="modal-title">✍️ Digitale Unterschrift</div>
    <div class="modal-sub">Zeichne deine Unterschrift und sende sie als Nachricht</div>
    <canvas class="sig-canvas" id="sigCanvas" width="460" height="120"></canvas>
    <div class="btn-row">
      <button class="btn b-gh" onclick="clearSig()">↺ Löschen</button>
      <button class="btn b-gh" onclick="closeSigModal()">Abbrechen</button>
      <button class="btn b-or" onclick="sendSignature()">✍️ Senden</button>
    </div>
  </div>
</div>

<script>
const SB_URL='https://nojmxfelunqaotqslabk.supabase.co';
const SB_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vam14ZmVsdW5xYW90cXNsYWJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyNjg4NzcsImV4cCI6MjA5NDg0NDg3N30.14x_oz0vxPXqbwBCcBeUZmE-s6Eg4QNbBWCorMsvfFo';
const sb = supabase.createClient(SB_URL, SB_ANON);

let currentUser = null;
let currentProfile = null;
let currentChatId = null;
let messages = [];
let members = [];
let replyToId = null;
let sigDrawing = false;
let sigCtx = null;

// Get chat ID from URL
const params = new URLSearchParams(location.search);
currentChatId = params.get('chat');

async function init(){
  const { data: { session } } = await sb.auth.getSession();
  if(!session){ location.href = 'login.html'; return; }
  currentUser = session.user;

  const { data: profile } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
  if(!profile || profile.status !== 'active'){ location.href = 'login.html'; return; }
  currentProfile = profile;

  if(!currentChatId){ location.href = 'index.html'; return; }

  await loadChat();
  await loadMessages();
  await loadMembers();
  subscribeToMessages();
}

async function loadChat(){
  const { data: chat } = await sb.from('chats').select('*, auftraege(name, kategorie)').eq('id', currentChatId).single();
  if(!chat) return;
  document.getElementById('chatName').textContent = chat.name;
  const icons = {Konzert:'🎸',Festival:'🎪',Promotion:'📣',ESL:'🏷️',Sport:'🥊',Kino:'🎬'};
  document.getElementById('chatAvatar').textContent = icons[chat.auftraege?.kategorie] || '💬';
}

async function loadMembers(){
  const { data } = await sb.from('chat_members').select('*, profiles(id,vorname,nachname,role)').eq('chat_id', currentChatId);
  members = data || [];
  document.getElementById('chatMembersCount').textContent = members.length + ' Mitglieder';
  document.getElementById('membersList').innerHTML = members.map(m => {
    const p = m.profiles;
    const initials = (p.vorname[0]||'') + (p.nachname[0]||'');
    return `<div class="member-row">
      <div class="member-ava">${initials}</div>
      <div><div class="member-name">${p.vorname} ${p.nachname}</div>
      <div class="member-role">${p.role === 'admin' ? '👑 Admin' : '🦺 Crew'}</div></div>
      ${p.id === currentUser.id ? '' : '<div class="online-dot"></div>'}
    </div>`;
  }).join('');
}

async function loadMessages(){
  const { data } = await sb.from('messages').select('*, profiles(vorname,nachname,role)').eq('chat_id', currentChatId).order('created_at', { ascending: true });
  messages = data || [];
  renderMessages();
  scrollToBottom();

  // Show pinned
  const pinned = messages.filter(m => m.pinned);
  if(pinned.length){
    document.getElementById('pinnedBar').classList.add('show');
    document.getElementById('pinnedText').textContent = `📌 ${pinned[pinned.length-1].content || 'Anhang'}`;
  }
}

function renderMessages(){
  const wrap = document.getElementById('msgsWrap');
  if(!messages.length){
    wrap.innerHTML = '<div class="empty-chat"><div class="ei">💬</div><p>Noch keine Nachrichten.<br>Schreib die erste!</p></div>';
    return;
  }

  let html = '';
  let lastDate = '';

  messages.forEach(msg => {
    const date = new Date(msg.created_at).toLocaleDateString('de', {weekday:'short',day:'numeric',month:'short'});
    if(date !== lastDate){
      html += `<div class="date-div"><span>${date}</span></div>`;
      lastDate = date;
    }

    const isOwn = msg.user_id === currentUser.id;
    const isAdmin = msg.profiles?.role === 'admin';
    const time = new Date(msg.created_at).toLocaleTimeString('de', {hour:'2-digit',minute:'2-digit'});
    const initials = (msg.profiles?.vorname?.[0]||'') + (msg.profiles?.nachname?.[0]||'');
    const name = msg.profiles ? `${msg.profiles.vorname} ${msg.profiles.nachname}` : 'Unbekannt';
    const bubbleClass = isOwn ? 'own' : isAdmin ? 'admin-msg' : 'other';

    const attHTML = msg.attachment_url ? `
      <a class="msg-attachment" href="${msg.attachment_url}" target="_blank">
        <span class="msg-att-icon">${getFileIcon(msg.attachment_name||'')}</span>
        <div>
          <div class="msg-att-name">${msg.attachment_name||'Anhang'}</div>
          <div class="msg-att-size">Tippen zum Öffnen</div>
        </div>
      </a>` : '';

    const actionsHTML = !isOwn ? `
      <div class="msg-actions">
        <button class="mac" onclick="setReply('${msg.id}','${(msg.content||'').replace(/'/g,"\\'")}')">↩️</button>
        ${currentProfile?.role==='admin' ? `<button class="mac" onclick="pinMessage('${msg.id}',${!msg.pinned})">${msg.pinned?'📌✕':'📌'}</button>` : ''}
      </div>` : `
      <div class="msg-actions">
        <button class="mac" onclick="setReply('${msg.id}','${(msg.content||'').replace(/'/g,"\\'")}')">↩️</button>
        <button class="mac" onclick="deleteMessage('${msg.id}')">🗑️</button>
      </div>`;

    html += `<div class="msg-row ${isOwn?'own':''}" id="msg-${msg.id}">
      ${!isOwn ? `<div class="msg-avatar">${initials}</div>` : ''}
      <div style="position:relative">
        ${actionsHTML}
        <div class="msg-bubble ${bubbleClass}">
          ${!isOwn && !isAdmin ? `<div class="msg-sender">${name}${isAdmin?' 👑':''}</div>` : ''}
          ${isAdmin && !isOwn ? `<div class="msg-sender" style="color:#f97316">👑 FESS Admin</div>` : ''}
          ${msg.pinned ? '<span class="pin-badge">📌</span>' : ''}
          ${msg.content ? `<div>${msg.content}</div>` : ''}
          ${attHTML}
          <div class="msg-time">${time}</div>
        </div>
      </div>
      ${isOwn ? `<div class="msg-avatar">${initials}</div>` : ''}
    </div>`;
  });

  wrap.innerHTML = html;
}

function subscribeToMessages(){
  sb.channel('chat-'+currentChatId)
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `chat_id=eq.${currentChatId}` },
      async (payload) => {
        const { data: msg } = await sb.from('messages').select('*, profiles(vorname,nachname,role)').eq('id', payload.new.id).single();
        if(msg){ messages.push(msg); renderMessages(); scrollToBottom(); }
      })
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'messages', filter: `chat_id=eq.${currentChatId}` },
      async (payload) => {
        const idx = messages.findIndex(m => m.id === payload.new.id);
        if(idx > -1){ const {data:msg} = await sb.from('messages').select('*, profiles(vorname,nachname,role)').eq('id', payload.new.id).single(); if(msg){messages[idx]=msg;renderMessages();} }
      })
    .subscribe();
}

async function sendMessage(content, attachmentUrl, attachmentName, attachmentType){
  const input = document.getElementById('msgInput');
  const text = content || input.value.trim();
  if(!text && !attachmentUrl) return;

  const msgData = {
    chat_id: currentChatId,
    user_id: currentUser.id,
    content: text || null,
    attachment_url: attachmentUrl || null,
    attachment_name: attachmentName || null,
    attachment_type: attachmentType || null,
    reply_to: replyToId || null
  };

  input.value = '';
  autoResize(input);
  clearReply();

  const { error } = await sb.from('messages').insert([msgData]);
  if(error) showToast('Fehler beim Senden');
}

async function handleFileSelect(event){
  const file = event.target.files[0];
  if(!file) return;
  if(file.size > 10 * 1024 * 1024){ showToast('Max. 10 MB erlaubt'); return; }

  showToast('Wird hochgeladen…');
  const ext = file.name.split('.').pop();
  const path = `${currentChatId}/${Date.now()}.${ext}`;

  const { data, error } = await sb.storage.from('chat-attachments').upload(path, file);
  if(error){ showToast('Upload fehlgeschlagen'); return; }

  const { data: { publicUrl } } = sb.storage.from('chat-attachments').getPublicUrl(path);
  await sendMessage('', publicUrl, file.name, file.type);
  event.target.value = '';
}

function setReply(id, text){
  replyToId = id;
  document.getElementById('replyText').textContent = '↩️ ' + text.substring(0, 60) + (text.length > 60 ? '…' : '');
  document.getElementById('replyPreview').classList.add('show');
  document.getElementById('msgInput').focus();
}
function clearReply(){ replyToId = null; document.getElementById('replyPreview').classList.remove('show'); }

async function pinMessage(id, pin){
  await sb.from('messages').update({ pinned: pin, pinned_by: currentUser.id }).eq('id', id);
  showToast(pin ? '📌 Nachricht gepinnt' : 'Pin entfernt');
}

async function deleteMessage(id){
  if(!confirm('Nachricht löschen?')) return;
  await sb.from('messages').delete().eq('id', id).eq('user_id', currentUser.id);
  messages = messages.filter(m => m.id !== id);
  renderMessages();
}

function showPinnedMessages(){
  const pinned = messages.filter(m => m.pinned);
  if(!pinned.length){ showToast('Keine gepinnten Nachrichten'); return; }
  // Scroll to last pinned
  const el = document.getElementById('msg-' + pinned[pinned.length-1].id);
  if(el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function toggleMembers(){
  document.getElementById('membersPanel').classList.toggle('open');
}

function scrollToBottom(){
  const wrap = document.getElementById('msgsWrap');
  setTimeout(() => wrap.scrollTop = wrap.scrollHeight, 50);
}

function handleKey(e){
  if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(); }
}

function autoResize(el){
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function getFileIcon(name){
  const ext = name.split('.').pop().toLowerCase();
  const icons = {pdf:'📄',doc:'📝',docx:'📝',xls:'📊',xlsx:'📊',jpg:'🖼️',jpeg:'🖼️',png:'🖼️',mp4:'🎬',mp3:'🎵',zip:'🗜️'};
  return icons[ext] || '📎';
}

// ── SIGNATURE ──
function openSigModal(){
  document.getElementById('sigModal').classList.add('open');
  initSigCanvas();
}
function closeSigModal(){ document.getElementById('sigModal').classList.remove('open'); }

function initSigCanvas(){
  const canvas = document.getElementById('sigCanvas');
  const ctx = canvas.getContext('2d');
  sigCtx = ctx;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = '#111827';
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  let drawing = false;
  function getPos(e){
    const r = canvas.getBoundingClientRect();
    const src = e.touches ? e.touches[0] : e;
    return { x: (src.clientX - r.left) * (canvas.width / r.width), y: (src.clientY - r.top) * (canvas.height / r.height) };
  }
  canvas.onmousedown = canvas.ontouchstart = e => { e.preventDefault(); drawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); };
  canvas.onmousemove = canvas.ontouchmove = e => { e.preventDefault(); if(!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); };
  canvas.onmouseup = canvas.ontouchend = () => drawing = false;
}

function clearSig(){ const c = document.getElementById('sigCanvas'); c.getContext('2d').clearRect(0,0,c.width,c.height); }

async function sendSignature(){
  const canvas = document.getElementById('sigCanvas');
  const dataUrl = canvas.toDataURL('image/png');
  const blob = await (await fetch(dataUrl)).blob();
  const path = `${currentUser.id}/${Date.now()}.png`;

  const { error } = await sb.storage.from('signatures').upload(path, blob, { contentType: 'image/png' });
  if(error){ showToast('Fehler beim Speichern'); return; }

  const { data: { publicUrl } } = sb.storage.from('signatures').getPublicUrl(path);
  await sendMessage('✍️ Unterschrift', publicUrl, 'Unterschrift.png', 'image/png');

  // Save to signatures table
  await sb.from('signatures').insert([{ user_id: currentUser.id, chat_id: currentChatId, signature_data: dataUrl }]);
  closeSigModal();
  showToast('Unterschrift gesendet ✅');
}

function showToast(msg){
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

init();
</script>
