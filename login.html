<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="fess.jobs">
<meta name="theme-color" content="#E8651A">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.svg">
<title>fess.jobs – Login</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bitter:wght@700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--or:#E8651A;--font:'Barlow',sans-serif}
body{background:var(--or);font-family:var(--font);min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.logo-wrap{text-align:center;margin-bottom:28px}
.logo-box{width:90px;height:90px;background:rgba(0,0,0,.12);border-radius:22px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;border:2px solid rgba(255,255,255,.15)}
.logo-text{font-family:Georgia,serif;font-size:62px;font-weight:900;color:#fff;line-height:1}
.app-name{font-family:'Bitter',serif;font-weight:900;font-size:26px;color:#fff}
.app-sub{font-size:13px;color:rgba(255,255,255,.8);margin-top:4px}
.card{background:#fff;border-radius:20px;padding:28px 24px;width:100%;max-width:380px;box-shadow:0 24px 60px rgba(0,0,0,.25)}
.tab-row{display:flex;background:#f3f4f6;border-radius:10px;padding:3px;margin-bottom:22px}
.tab{flex:1;padding:9px;border:none;background:none;border-radius:8px;font-family:var(--font);font-size:13px;font-weight:600;color:#6b7280;cursor:pointer;transition:all .15s}
.tab.on{background:#fff;color:#111827;box-shadow:0 1px 3px rgba(0,0,0,.12)}
.form-view{display:none}.form-view.on{display:block}
.fg{margin-bottom:14px}
.fl{display:block;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#9ca3af;margin-bottom:5px}
.fi{width:100%;background:#f9fafb;border:1.5px solid #e5e7eb;border-radius:10px;color:#111827;font-family:var(--font);font-size:14px;padding:12px 14px;outline:none;transition:border-color .15s;-webkit-appearance:none}
.fi:focus{border-color:var(--or);background:#fff}
.btn-main{width:100%;background:var(--or);color:#fff;border:none;border-radius:10px;font-family:'Bitter',serif;font-weight:800;font-size:15px;padding:14px;cursor:pointer;margin-top:4px;transition:all .15s}
.btn-main:hover{background:#d4580f}
.btn-main:disabled{background:#f3a67f;cursor:not-allowed}
.msg{padding:11px 14px;border-radius:9px;font-size:12px;margin-bottom:14px;display:none;font-weight:500}
.msg.err{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.msg.ok{background:#ecfdf5;color:#059669;border:1px solid #a7f3d0}
.msg.info{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
.pending-box{text-align:center;padding:8px 0}
.pending-icon{font-size:52px;margin-bottom:12px}
.pending-title{font-family:'Bitter',serif;font-weight:900;font-size:20px;color:#111827;margin-bottom:8px}
.pending-text{font-size:12px;color:#6b7280;line-height:1.7}
.loading{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.footer-links{text-align:center;margin-top:18px;font-size:11px;color:rgba(255,255,255,.75)}
.footer-links a{color:#fff;text-decoration:none;font-weight:600}
.forgot{text-align:center;margin-top:12px}
.forgot a{font-size:12px;color:var(--or);text-decoration:none;font-weight:600}
.name-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
</style>
</head>
<body>

<div class="logo-wrap">
  <div class="logo-box">
    <div class="logo-text">F</div>
  </div>
  <div class="app-name">fess.jobs</div>
  <div class="app-sub">Dein Einstieg in die Eventbranche</div>
</div>

<div class="card">
  <div class="tab-row">
    <button class="tab on" id="tab-login" onclick="showTab('login')">Anmelden</button>
    <button class="tab" id="tab-register" onclick="showTab('register')">Registrieren</button>
  </div>

  <div id="msg" class="msg"></div>

  <!-- LOGIN -->
  <div class="form-view on" id="view-login">
    <div class="fg">
      <label class="fl">E-Mail</label>
      <input class="fi" id="login-email" type="email" placeholder="deine@email.de" autocomplete="email">
    </div>
    <div class="fg">
      <label class="fl">Passwort</label>
      <input class="fi" id="login-pw" type="password" placeholder="••••••••" autocomplete="current-password"
        onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn-main" id="login-btn" onclick="doLogin()">Anmelden</button>
    <div class="forgot"><a href="#" onclick="doForgot();return false">Passwort vergessen?</a></div>
  </div>

  <!-- REGISTER -->
  <div class="form-view" id="view-register">
    <div class="name-row">
      <div class="fg">
        <label class="fl">Vorname *</label>
        <input class="fi" id="reg-vorname" placeholder="Max" autocomplete="given-name">
      </div>
      <div class="fg">
        <label class="fl">Nachname *</label>
        <input class="fi" id="reg-nachname" placeholder="Muster" autocomplete="family-name">
      </div>
    </div>
    <div class="fg">
      <label class="fl">Telefon *</label>
      <input class="fi" id="reg-tel" type="tel" placeholder="+49 176 …" autocomplete="tel">
    </div>
    <div class="fg">
      <label class="fl">E-Mail *</label>
      <input class="fi" id="reg-email" type="email" placeholder="deine@email.de" autocomplete="email">
    </div>
    <div class="fg">
      <label class="fl">Passwort *</label>
      <input class="fi" id="reg-pw" type="password" placeholder="Mindestens 6 Zeichen" autocomplete="new-password">
    </div>
    <button class="btn-main" id="reg-btn" onclick="doRegister()">Jetzt registrieren</button>
  </div>

  <!-- PENDING -->
  <div class="form-view" id="view-pending">
    <div class="pending-box">
      <div class="pending-icon">⏳</div>
      <div class="pending-title">Anfrage eingegangen!</div>
      <p class="pending-text">Deine Registrierung als <strong>FESS Crew</strong> wird geprüft.<br><br>
      Du erhältst eine WhatsApp-Nachricht sobald dein Zugang freigeschaltet wurde.</p>
      <button class="btn-main" style="margin-top:18px" onclick="doSignOut()">Abmelden</button>
    </div>
  </div>
</div>

<div class="footer-links">
  <a href="https://fess-recruitment.de/datenschutz" target="_blank">Datenschutz</a>
  &nbsp;·&nbsp;
  <a href="https://fess-recruitment.de/impressum" target="_blank">Impressum</a>
</div>

<script>
// ── Supabase ──
const SB_URL = 'https://nojmxfelunqaotqslabk.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vam14ZmVsdW5xYW90cXNsYWJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyNjg4NzcsImV4cCI6MjA5NDg0NDg3N30.14x_oz0vxPXqbwBCcBeUZmE-s6Eg4QNbBWCorMsvfFo';
const sb = supabase.createClient(SB_URL, SB_ANON);

// ── PWA Service Worker ──
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').then(()=>console.log('SW ok')).catch(e=>console.warn('SW:',e));
}

// ── UI Helpers ──
function showTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.form-view').forEach(v=>v.classList.remove('on'));
  document.getElementById('tab-'+tab).classList.add('on');
  document.getElementById('view-'+tab).classList.add('on');
  clearMsg();
}

function showMsg(text, type='err'){
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg '+type;
  el.style.display = 'block';
}
function clearMsg(){ document.getElementById('msg').style.display='none'; }

function setBtn(id, loading, label){
  const btn = document.getElementById(id);
  btn.disabled = loading;
  btn.innerHTML = loading ? '<span class="loading"></span>Bitte warten…' : label;
}

// ── Redirect logic ──
async function redirectUser(user){
  // Admin by email
  if(user.email === 'admin@fess.jobs'){
    window.location.href = 'admin-fess2025.html'; return;
  }
  // Check profiles table
  try {
    const { data: p } = await sb.from('profiles').select('role,status').eq('id', user.id).single();
    if(p?.role === 'admin'){ window.location.href = 'admin-fess2025.html'; return; }
    if(p?.status === 'pending'){ showPending(); return; }
    if(p?.status === 'blocked'){ await sb.auth.signOut(); showMsg('Zugang gesperrt. Kontakt: admin@fess.jobs', 'err'); return; }
  } catch(e){ /* profiles table not set up yet, allow access */ }
  window.location.href = 'index.html';
}

function showPending(){
  document.querySelectorAll('.tab').forEach(t=>t.style.display='none');
  document.querySelectorAll('.form-view').forEach(v=>v.classList.remove('on'));
  document.getElementById('view-pending').classList.add('on');
}

async function doSignOut(){ await sb.auth.signOut(); location.reload(); }

// ── Check existing session ──
sb.auth.getSession().then(({ data: { session }}) => {
  if(session) redirectUser(session.user);
});

// ── LOGIN ──
async function doLogin(){
  const email = document.getElementById('login-email').value.trim();
  const pw    = document.getElementById('login-pw').value;
  if(!email || !pw){ showMsg('Bitte E-Mail und Passwort eingeben'); return; }
  setBtn('login-btn', true, 'Anmelden');
  clearMsg();
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });
  if(error){
    const msgs = {
      'Invalid login credentials': 'E-Mail oder Passwort falsch.',
      'Email not confirmed': 'Bitte bestätige zuerst deine E-Mail.',
    };
    showMsg(msgs[error.message] || error.message);
    setBtn('login-btn', false, 'Anmelden');
    return;
  }
  redirectUser(data.user);
}

// ── REGISTER ──
async function doRegister(){
  const vorname = document.getElementById('reg-vorname').value.trim();
  const nachname= document.getElementById('reg-nachname').value.trim();
  const tel     = document.getElementById('reg-tel').value.trim();
  const email   = document.getElementById('reg-email').value.trim();
  const pw      = document.getElementById('reg-pw').value;
  if(!vorname||!nachname||!tel||!email||!pw){ showMsg('Bitte alle Felder ausfüllen'); return; }
  if(pw.length < 6){ showMsg('Passwort muss mindestens 6 Zeichen haben'); return; }
  setBtn('reg-btn', true, 'Registrieren');
  clearMsg();
  const { data, error } = await sb.auth.signUp({
    email, password: pw,
    options:{ data:{ vorname, nachname, telefon: tel } }
  });
  if(error){ showMsg(error.message); setBtn('reg-btn', false, 'Jetzt registrieren'); return; }
  // Save to profiles
  if(data.user){
    try {
      await sb.from('profiles').upsert({
        id: data.user.id, email, vorname, nachname,
        telefon: tel, status: 'pending', role: 'crew'
      });
    } catch(e){ console.warn('profiles:', e); }
  }
  // Show pending or email confirm message
  showPending();
}

// ── FORGOT PASSWORD ──
async function doForgot(){
  const email = document.getElementById('login-email').value.trim();
  if(!email){ showMsg('Bitte zuerst E-Mail eingeben', 'info'); return; }
  const { error } = await sb.auth.resetPasswordForEmail(email);
  if(error) showMsg(error.message);
  else showMsg('Reset-Link wurde an deine E-Mail gesendet!', 'ok');
}
</script>
</body>
</html>
