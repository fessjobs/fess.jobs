<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="fess.jobs">
<meta name="theme-color" content="#E8651A">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.svg">
<title>fess.jobs – Login</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bitter:wght@700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--or:#E8651A;--font:'Barlow',sans-serif}
body{background:var(--or);font-family:var(--font);min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;padding-top:env(safe-area-inset-top)}
.logo-wrap{text-align:center;margin-bottom:32px}
.logo-box{width:90px;height:90px;background:rgba(255,255,255,.15);border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
.logo-text{font-family:'Bitter',serif;font-size:36px;font-weight:900;color:#fff}
.app-name{font-family:'Bitter',serif;font-weight:900;font-size:24px;color:#fff}
.app-sub{font-size:13px;color:rgba(255,255,255,.75);margin-top:4px}
.card{background:#fff;border-radius:20px;padding:28px 24px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.tab-row{display:flex;background:#f3f4f6;border-radius:10px;padding:3px;margin-bottom:20px}
.tab{flex:1;padding:8px;border:none;background:none;border-radius:8px;font-family:var(--font);font-size:13px;font-weight:600;color:#6b7280;cursor:pointer;transition:all .15s}
.tab.on{background:#fff;color:#111827;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.form-view{display:none}.form-view.on{display:block}
.fg{margin-bottom:12px}
.fl{display:block;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#9ca3af;margin-bottom:5px}
.fi{width:100%;background:#f9fafb;border:1.5px solid #e5e7eb;border-radius:10px;color:#111827;font-family:var(--font);font-size:14px;padding:11px 14px;outline:none;transition:border-color .15s}
.fi:focus{border-color:var(--or)}
.btn-main{width:100%;background:var(--or);color:#fff;border:none;border-radius:10px;font-family:'Bitter',serif;font-weight:800;font-size:15px;padding:13px;cursor:pointer;margin-top:4px;transition:background .15s}
.btn-main:hover{background:#d4580f}
.btn-main:disabled{background:#f3a67f;cursor:not-allowed}
.divider{display:flex;align-items:center;gap:10px;margin:16px 0;color:#d1d5db;font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#e5e7eb}
.btn-social{width:100%;background:#f9fafb;border:1.5px solid #e5e7eb;border-radius:10px;font-family:var(--font);font-weight:600;font-size:13px;padding:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px;transition:border-color .15s;color:#111827}
.btn-social:hover{border-color:#d1d5db;background:#f3f4f6}
.msg{padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:12px;display:none}
.msg.err{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.msg.ok{background:#ecfdf5;color:#059669;border:1px solid #a7f3d0}
.msg.info{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
.pending-box{text-align:center;padding:8px 0}
.pending-box .pi{font-size:48px;margin-bottom:10px}
.pending-box h3{font-family:'Bitter',serif;font-weight:800;font-size:18px;color:#111827;margin-bottom:6px}
.pending-box p{font-size:12px;color:#6b7280;line-height:1.6}
.loading{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.footer-links{text-align:center;margin-top:16px;font-size:11px;color:rgba(255,255,255,.7)}
.footer-links a{color:rgba(255,255,255,.9);text-decoration:none}
</style>
</head>
<body>

<div class="logo-wrap">
  <div class="logo-box">
    <div class="logo-text">FESS</div>
  </div>
  <div class="app-name">fess.jobs</div>
  <div class="app-sub">Dein Einstieg in die Eventbranche</div>
</div>

<div class="card">
  <div class="tab-row">
    <button class="tab on" onclick="showTab('login',this)">Anmelden</button>
    <button class="tab" onclick="showTab('register',this)">Registrieren</button>
  </div>

  <div id="msg" class="msg"></div>

  <!-- LOGIN -->
  <div class="form-view on" id="view-login">
    <div class="fg">
      <label class="fl">E-Mail</label>
      <input class="fi" id="login-email" type="email" placeholder="deine@email.de" autocomplete="email">
    </div>
    <div class="fg">
      <label class="fl">Passwort</label>
      <input class="fi" id="login-pw" type="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-main" id="login-btn" onclick="doLogin()">Anmelden</button>
    <div class="divider">oder</div>
    <button class="btn-social" onclick="doGoogle()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Mit Google anmelden
    </button>
    <button class="btn-social" onclick="doApple()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="#111827"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
      Mit Apple anmelden
    </button>
    <div style="text-align:center;margin-top:10px">
      <a href="#" onclick="showForgot()" style="font-size:12px;color:var(--or);text-decoration:none">Passwort vergessen?</a>
    </div>
  </div>

  <!-- REGISTER -->
  <div class="form-view" id="view-register">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="fg">
        <label class="fl">Vorname *</label>
        <input class="fi" id="reg-vorname" placeholder="Max" autocomplete="given-name">
      </div>
      <div class="fg">
        <label class="fl">Nachname *</label>
        <input class="fi" id="reg-nachname" placeholder="Muster" autocomplete="family-name">
      </div>
    </div>
    <div class="fg">
      <label class="fl">Telefon *</label>
      <input class="fi" id="reg-tel" type="tel" placeholder="+49 176 …" autocomplete="tel">
    </div>
    <div class="fg">
      <label class="fl">E-Mail *</label>
      <input class="fi" id="reg-email" type="email" placeholder="deine@email.de" autocomplete="email">
    </div>
    <div class="fg">
      <label class="fl">Passwort *</label>
      <input class="fi" id="reg-pw" type="password" placeholder="Mind. 8 Zeichen" autocomplete="new-password">
    </div>
    <button class="btn-main" id="reg-btn" onclick="doRegister()">Registrieren</button>
    <div class="divider">oder</div>
    <button class="btn-social" onclick="doGoogle()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Mit Google registrieren
    </button>
  </div>

  <!-- PENDING -->
  <div class="form-view" id="view-pending">
    <div class="pending-box">
      <div class="pi">⏳</div>
      <h3>Anfrage eingegangen!</h3>
      <p>Deine Registrierung als <strong>FESS Crew</strong> wird von unserem Admin geprüft.<br><br>
      Du erhältst eine Benachrichtigung sobald dein Zugang freigeschaltet wurde.</p>
      <button class="btn-main" style="margin-top:16px" onclick="sb.auth.signOut().then(()=>location.reload())">Abmelden</button>
    </div>
  </div>
</div>

<div class="footer-links">
  <a href="https://fess-recruitment.de/datenschutz" target="_blank">Datenschutz</a>
  &nbsp;·&nbsp;
  <a href="https://fess-recruitment.de/impressum" target="_blank">Impressum</a>
</div>

<script>
const SB_URL='https://nojmxfelunqaotqslabk.supabase.co';
const SB_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vam14ZmVsdW5xYW90cXNsYWJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyNjg4NzcsImV4cCI6MjA5NDg0NDg3N30.14x_oz0vxPXqbwBCcBeUZmE-s6Eg4QNbBWCorMsvfFo';
const sb = supabase.createClient(SB_URL, SB_ANON);

// PWA Install
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js').then(r=>console.log('SW registered')).catch(e=>console.warn('SW:',e));
}

function showTab(tab, el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.form-view').forEach(v=>v.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('view-'+tab).classList.add('on');
  clearMsg();
}

function showMsg(text, type='err'){
  const el=document.getElementById('msg');
  el.textContent=text; el.className='msg '+type; el.style.display='block';
}
function clearMsg(){ const el=document.getElementById('msg'); el.style.display='none'; }

function setLoading(btnId, loading){
  const btn=document.getElementById(btnId);
  if(loading){ btn.disabled=true; btn.innerHTML='<span class="loading"></span>Bitte warten…'; }
  else{ btn.disabled=false; btn.textContent=btn.id==='login-btn'?'Anmelden':'Registrieren'; }
}

async function checkAndRedirect(user){
  if(!user) return;
  // Get profile
  const { data: profile } = await sb.from('profiles').select('*').eq('id', user.id).single();

  if(!profile){
    // New user via OAuth - show pending
    document.querySelectorAll('.form-view').forEach(v=>v.classList.remove('on'));
    document.getElementById('view-pending').classList.add('on');
    return;
  }

  if(profile.status === 'pending'){
    document.querySelectorAll('.tab').forEach(t=>t.style.display='none');
    document.querySelectorAll('.form-view').forEach(v=>v.classList.remove('on'));
    document.getElementById('view-pending').classList.add('on');
    return;
  }

  if(profile.status === 'blocked'){
    await sb.auth.signOut();
    showMsg('Dein Zugang wurde gesperrt. Kontaktiere den Admin.', 'err');
    return;
  }

  if(profile.status === 'active'){
    if(profile.role === 'admin'){
      window.location.href = 'admin-fess2025.html';
    } else {
      window.location.href = 'index.html';
    }
  }
}

// Check if already logged in
sb.auth.getSession().then(({ data: { session } }) => {
  if(session) checkAndRedirect(session.user);
});

// Auth state changes
sb.auth.onAuthStateChange((event, session) => {
  if(event === 'SIGNED_IN' && session) checkAndRedirect(session.user);
});

async function doLogin(){
  const email = document.getElementById('login-email').value.trim();
  const pw = document.getElementById('login-pw').value;
  if(!email || !pw){ showMsg('Bitte E-Mail und Passwort eingeben'); return; }
  setLoading('login-btn', true);
  clearMsg();
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });
  if(error){ showMsg(error.message === 'Invalid login credentials' ? 'E-Mail oder Passwort falsch' : error.message); setLoading('login-btn', false); return; }
  // checkAndRedirect called via onAuthStateChange
}

async function doRegister(){
  const vorname = document.getElementById('reg-vorname').value.trim();
  const nachname = document.getElementById('reg-nachname').value.trim();
  const tel = document.getElementById('reg-tel').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pw = document.getElementById('reg-pw').value;
  if(!vorname||!nachname||!tel||!email||!pw){ showMsg('Bitte alle Felder ausfüllen'); return; }
  if(pw.length < 8){ showMsg('Passwort muss mindestens 8 Zeichen haben'); return; }
  setLoading('reg-btn', true);
  clearMsg();
  const { data, error } = await sb.auth.signUp({
    email, password: pw,
    options: { data: { vorname, nachname, telefon: tel } }
  });
  if(error){ showMsg(error.message); setLoading('reg-btn', false); return; }
  // Update profile with additional data
  if(data.user){
    await sb.from('profiles').upsert({
      id: data.user.id, email, vorname, nachname,
      telefon: tel, status: 'pending', role: 'crew'
    });
  }
  document.querySelectorAll('.tab').forEach(t=>t.style.display='none');
  document.querySelectorAll('.form-view').forEach(v=>v.classList.remove('on'));
  document.getElementById('view-pending').classList.add('on');
}

async function doGoogle(){
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/login.html' }
  });
  if(error) showMsg(error.message);
}

async function doApple(){
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'apple',
    options: { redirectTo: window.location.origin + '/login.html' }
  });
  if(error) showMsg(error.message);
}

async function showForgot(){
  const email = document.getElementById('login-email').value.trim();
  if(!email){ showMsg('Bitte zuerst deine E-Mail eingeben', 'info'); return; }
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/login.html'
  });
  if(error) showMsg(error.message);
  else showMsg('Reset-Link wurde an deine E-Mail gesendet!', 'ok');
}
</script>
</body>
</html>
