<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>fess.jobs · QR Code Designer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bitter:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f3f4f6;min-height:100vh;padding:32px 20px}
header{max-width:960px;margin:0 auto 32px;display:flex;align-items:center;gap:14px}
.logo{font-family:'Bitter',serif;font-size:28px;color:#e8651a;font-weight:900}
.logo span{color:#1c1c1e}
h1{font-size:18px;font-weight:600;color:#1c1c1e}
.sub{font-size:12px;color:#9ca3af;margin-top:2px}
.grid{max-width:960px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px}
.card{background:#fff;border-radius:20px;padding:20px;box-shadow:0 1px 6px rgba(0,0,0,.06)}
.card-label{font-size:13px;font-weight:700;color:#374151;margin-bottom:2px}
.card-desc{font-size:11px;color:#9ca3af;margin-bottom:14px}
.preview-wrap{border-radius:12px;overflow:hidden;background:#e5e7eb;position:relative}
canvas{display:block;width:100%;height:auto}
.btn{display:block;width:100%;margin-top:12px;padding:11px;background:#e8651a;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:.3px;transition:background .15s}
.btn:hover{background:#d4581a}
.btn:active{background:#c04e15}
.loading{text-align:center;padding:80px 20px;color:#9ca3af;font-size:13px;max-width:960px;margin:0 auto}
@media(max-width:700px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <div class="logo">fess<span>.jobs</span></div>
  <div>
    <div class="h1">QR Code Export</div>
    <div class="sub">Tutorial · fessjobs.github.io/fess.jobs/tutorial.html</div>
  </div>
</header>

<div class="loading" id="loading">⏳ QR Codes werden generiert…</div>

<div class="grid" id="grid" style="display:none">
  <div class="card">
    <div class="card-label">📸 Instagram Post</div>
    <div class="card-desc">1080 × 1080 px · Quadratisch</div>
    <div class="preview-wrap"><canvas id="c-post"></canvas></div>
    <button class="btn" onclick="dl('c-post','fessjobs_instagram_post.png')">⬇ PNG herunterladen</button>
  </div>
  <div class="card">
    <div class="card-label">📱 Instagram Story</div>
    <div class="card-desc">1080 × 1920 px · Hochformat</div>
    <div class="preview-wrap"><canvas id="c-story"></canvas></div>
    <button class="btn" onclick="dl('c-story','fessjobs_instagram_story.png')">⬇ PNG herunterladen</button>
  </div>
  <div class="card">
    <div class="card-label">💳 Apple Wallet Card</div>
    <div class="card-desc">1024 × 648 px · Querformat</div>
    <div class="preview-wrap"><canvas id="c-wallet"></canvas></div>
    <button class="btn" onclick="dl('c-wallet','fessjobs_apple_wallet.png')">⬇ PNG herunterladen</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script>
const QR_URL = 'https://fessjobs.github.io/fess.jobs/tutorial.html';
const OR = '#e8651a';
const OR2 = '#c94e0a';
const DARK = '#1c1c1e';

async function makeQR(size, dark, light) {
  const c = document.createElement('canvas');
  await QRCode.toCanvas(c, QR_URL, {
    width: size, margin: 1,
    color: { dark: dark||'#000000', light: light||'#ffffff' },
    errorCorrectionLevel: 'H'
  });
  return c;
}

function rr(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

// ── INSTAGRAM POST ──────────────────────────────────────
async function drawPost() {
  const W=1080, H=1080;
  const cv=document.getElementById('c-post');
  cv.width=W; cv.height=H;
  const c=cv.getContext('2d');

  // Background
  c.fillStyle='#fff'; c.fillRect(0,0,W,H);

  // Top orange wave
  const g=c.createLinearGradient(0,0,W,440);
  g.addColorStop(0,OR); g.addColorStop(1,OR2);
  c.fillStyle=g;
  c.beginPath();
  c.moveTo(0,0); c.lineTo(W,0); c.lineTo(W,360);
  c.bezierCurveTo(W*0.75,460, W*0.25,380, 0,440);
  c.closePath(); c.fill();

  // fess.jobs text
  c.fillStyle='#fff';
  c.font='bold 110px Bitter,serif';
  c.textAlign='center';
  c.fillText('fess.jobs', W/2, 180);

  // tagline
  c.font='500 40px Inter,sans-serif';
  c.fillStyle='rgba(255,255,255,.85)';
  c.fillText('Dein Weg zu Top-Jobs im Eventbereich', W/2, 248);

  // Tutorial badge pill
  c.fillStyle='rgba(255,255,255,.2)';
  rr(c, W/2-160, 290, 320, 58, 29); c.fill();
  c.fillStyle='#fff';
  c.font='600 28px Inter,sans-serif';
  c.fillText('▶  Tutorial starten', W/2, 326);

  // QR card
  const qrSize=460;
  const qr=await makeQR(qrSize,'#1c1c1e','#ffffff');
  const cx=(W-qrSize-80)/2, cy=470;

  // Shadow
  c.shadowColor='rgba(0,0,0,.14)'; c.shadowBlur=50; c.shadowOffsetY=10;
  c.fillStyle='#fff';
  rr(c, cx, cy, qrSize+80, qrSize+80, 28); c.fill();
  c.shadowBlur=0; c.shadowOffsetY=0;

  // Orange border ring
  c.strokeStyle=OR; c.lineWidth=5;
  rr(c, cx, cy, qrSize+80, qrSize+80, 28); c.stroke();

  // Orange dot corners
  const dots=[[cx,cy],[cx+qrSize+80,cy],[cx,cy+qrSize+80],[cx+qrSize+80,cy+qrSize+80]];
  dots.forEach(([dx,dy])=>{
    c.fillStyle=OR;
    c.beginPath(); c.arc(dx,dy,8,0,Math.PI*2); c.fill();
  });

  c.drawImage(qr, cx+40, cy+40, qrSize, qrSize);

  // Scan label inside card bottom
  c.fillStyle='rgba(28,28,30,.4)';
  c.font='600 22px Inter,sans-serif';
  c.fillText('QR Code scannen', W/2, cy+qrSize+62);

  // Bottom URL
  c.fillStyle='#9ca3af';
  c.font='24px Inter,sans-serif';
  c.fillText('fessjobs.github.io/fess.jobs/tutorial.html', W/2, 1028);

  // Bottom orange bar
  c.fillStyle=OR;
  c.fillRect(0, 1050, W, 30);
  c.fillStyle='#fff';
  c.font='600 17px Inter,sans-serif';
  c.fillText('fess.jobs · Personaldienstleistungen', W/2, 1070);
}

// ── INSTAGRAM STORY ────────────────────────────────────
async function drawStory() {
  const W=1080, H=1920;
  const cv=document.getElementById('c-story');
  cv.width=W; cv.height=H;
  const c=cv.getContext('2d');

  // Dark gradient bg
  const g=c.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#0d0d0d'); g.addColorStop(0.6,'#1a1a1a'); g.addColorStop(1,'#111');
  c.fillStyle=g; c.fillRect(0,0,W,H);

  // Subtle grid pattern
  c.strokeStyle='rgba(255,255,255,.03)'; c.lineWidth=1;
  for(let x=0;x<W;x+=60){ c.beginPath(); c.moveTo(x,0); c.lineTo(x,H); c.stroke(); }
  for(let y=0;y<H;y+=60){ c.beginPath(); c.moveTo(0,y); c.lineTo(W,y); c.stroke(); }

  // Orange glow top
  const topGlow=c.createRadialGradient(W/2,0,0,W/2,0,500);
  topGlow.addColorStop(0,'rgba(232,101,26,.35)');
  topGlow.addColorStop(1,'rgba(232,101,26,0)');
  c.fillStyle=topGlow; c.fillRect(0,0,W,500);

  // Top bar
  c.fillStyle=OR; c.fillRect(0,0,W,8);

  // fess.jobs
  c.fillStyle=OR;
  c.font='bold 150px Bitter,serif';
  c.textAlign='center';
  c.fillText('fess.jobs', W/2, 280);

  // tagline
  c.fillStyle='rgba(255,255,255,.55)';
  c.font='500 50px Inter,sans-serif';
  c.fillText('Personaldienstleistungen', W/2, 370);

  // Divider
  const dg=c.createLinearGradient(W/2-250,0,W/2+250,0);
  dg.addColorStop(0,'transparent'); dg.addColorStop(.5,OR); dg.addColorStop(1,'transparent');
  c.strokeStyle=dg; c.lineWidth=2;
  c.beginPath(); c.moveTo(W/2-250,430); c.lineTo(W/2+250,430); c.stroke();

  // Instruction text
  c.fillStyle='rgba(255,255,255,.9)';
  c.font='600 56px Inter,sans-serif';
  c.fillText('Scann den Code &', W/2, 560);
  c.fillText('starte dein Tutorial', W/2, 632);

  // QR
  const qrSize=640;
  const qr=await makeQR(qrSize,'#ffffff','#1a1a1a');
  const qx=(W-qrSize-100)/2, qy=720;

  // Glow behind QR
  const qglow=c.createRadialGradient(W/2,qy+qrSize/2+50,0,W/2,qy+qrSize/2+50,500);
  qglow.addColorStop(0,'rgba(232,101,26,.2)');
  qglow.addColorStop(1,'rgba(232,101,26,0)');
  c.fillStyle=qglow; c.fillRect(0,qy-100,W,qrSize+300);

  // QR card
  c.fillStyle='#222';
  rr(c, qx, qy, qrSize+100, qrSize+100, 36); c.fill();
  c.strokeStyle=OR; c.lineWidth=4;
  rr(c, qx, qy, qrSize+100, qrSize+100, 36); c.stroke();

  c.drawImage(qr, qx+50, qy+50, qrSize, qrSize);

  // "oder" divider
  c.fillStyle='rgba(255,255,255,.25)';
  c.font='36px Inter,sans-serif';
  c.fillText('oder direkt öffnen:', W/2, 1580);

  // URL pill
  c.fillStyle='rgba(232,101,26,.15)';
  rr(c, W/2-320, 1600, 640, 64, 32); c.fill();
  c.strokeStyle='rgba(232,101,26,.4)'; c.lineWidth=2;
  rr(c, W/2-320, 1600, 640, 64, 32); c.stroke();
  c.fillStyle=OR;
  c.font='500 30px Inter,sans-serif';
  c.fillText('fess.jobs/tutorial', W/2, 1641);

  // CTA button
  const bg=c.createLinearGradient(W/2-220,0,W/2+220,0);
  bg.addColorStop(0,OR); bg.addColorStop(1,OR2);
  c.fillStyle=bg;
  rr(c, W/2-220, 1700, 440, 88, 44); c.fill();
  c.fillStyle='#fff';
  c.font='bold 38px Inter,sans-serif';
  c.fillText('▶  Jetzt starten', W/2, 1752);

  // Bottom
  c.fillStyle='rgba(255,255,255,.15)';
  c.font='26px Inter,sans-serif';
  c.fillText('fess.jobs · Dein Weg zu Top-Jobs', W/2, 1860);

  // Bottom bar
  c.fillStyle=OR; c.fillRect(0,H-8,W,8);
}

// ── APPLE WALLET ────────────────────────────────────────
async function drawWallet() {
  const W=1024, H=648;
  const cv=document.getElementById('c-wallet');
  cv.width=W; cv.height=H;
  const c=cv.getContext('2d');

  // Dark base
  c.fillStyle=DARK; c.fillRect(0,0,W,H);

  // Subtle dot grid
  for(let x=0;x<W;x+=28) for(let y=0;y<H;y+=28){
    c.fillStyle='rgba(255,255,255,.025)';
    c.beginPath(); c.arc(x,y,1,0,Math.PI*2); c.fill();
  }

  // Orange left panel with curve
  const og=c.createLinearGradient(0,0,380,H);
  og.addColorStop(0,OR); og.addColorStop(1,OR2);
  c.fillStyle=og;
  c.beginPath();
  c.moveTo(0,0); c.lineTo(360,0);
  c.bezierCurveTo(400,H*0.3, 400,H*0.7, 360,H);
  c.lineTo(0,H); c.closePath(); c.fill();

  // Top "pass type" label on orange
  c.fillStyle='rgba(255,255,255,.5)';
  c.font='700 16px Inter,sans-serif';
  c.textAlign='left';
  c.fillText('MITARBEITER-PORTAL', 36, 60);
  c.fillStyle='rgba(255,255,255,.3)';
  c.font='13px Inter,sans-serif';
  c.fillText('fess.jobs', 36, 80);

  // fess.jobs main
  c.fillStyle='#fff';
  c.font='bold 86px Bitter,serif';
  c.textAlign='center';
  c.fillText('fess.jobs', 175, 220);

  // Line
  c.strokeStyle='rgba(255,255,255,.25)'; c.lineWidth=1;
  c.beginPath(); c.moveTo(36,248); c.lineTo(314,248); c.stroke();

  c.fillStyle='rgba(255,255,255,.75)';
  c.font='500 22px Inter,sans-serif';
  c.fillText('Personaldienstleistungen', 175, 278);

  c.fillStyle='rgba(255,255,255,.5)';
  c.font='500 19px Inter,sans-serif';
  c.fillText('Scann für Tutorial ↓', 175, 340);

  // Small QR on orange panel
  const smallQR=await makeQR(160,'#fff','rgba(0,0,0,0)');
  c.fillStyle='rgba(0,0,0,.12)';
  rr(c,95,370,170,170,10); c.fill();
  c.drawImage(smallQR, 95, 370, 160, 160);

  // Right side - large QR
  const qrSize=310;
  const qr=await makeQR(qrSize,'#ffffff','#242428');
  const qx=460+(W-460-qrSize-40)/2, qy=(H-qrSize-60)/2;

  // Glow
  c.shadowColor=OR; c.shadowBlur=40;
  c.fillStyle='#28282e';
  rr(c, qx-18, qy-18, qrSize+36, qrSize+36, 18); c.fill();
  c.shadowBlur=0;

  c.strokeStyle=OR; c.lineWidth=3;
  rr(c, qx-18, qy-18, qrSize+36, qrSize+36, 18); c.stroke();

  c.drawImage(qr, qx, qy, qrSize, qrSize);

  // Label below QR
  c.fillStyle='rgba(255,255,255,.4)';
  c.font='600 18px Inter,sans-serif';
  c.textAlign='center';
  c.fillText('Tutorial starten', qx+qrSize/2, qy+qrSize+34);

  // Bottom strip
  const sg=c.createLinearGradient(0,H-52,0,H);
  sg.addColorStop(0,'rgba(28,28,30,0)'); sg.addColorStop(1,'rgba(28,28,30,.8)');
  c.fillStyle=sg; c.fillRect(0,H-52,W,52);
  c.fillStyle=OR; c.fillRect(0,H-4,W,4);

  c.fillStyle='rgba(255,255,255,.2)';
  c.font='14px Inter,sans-serif';
  c.textAlign='center';
  c.fillText('fess.jobs · Personaldienstleistungen · fessjobs.github.io/fess.jobs/tutorial.html', W/2, H-14);
}

function dl(id, name) {
  const a=document.createElement('a');
  a.download=name;
  a.href=document.getElementById(id).toDataURL('image/png');
  a.click();
}

async function init() {
  try {
    // Load fonts first
    await document.fonts.ready;
    await Promise.all([drawPost(), drawStory(), drawWallet()]);
    document.getElementById('loading').style.display='none';
    document.getElementById('grid').style.display='grid';
  } catch(e) {
    document.getElementById('loading').textContent='Fehler: '+e.message;
  }
}

init();
</script>
</body>
</html>
