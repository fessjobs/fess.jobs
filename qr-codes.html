<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>fess.jobs · QR Code Designer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bitter:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f3f4f6;min-height:100vh;padding:32px 20px}
header{max-width:980px;margin:0 auto 28px;display:flex;align-items:center;gap:14px}
.logo{font-family:'Bitter',serif;font-size:28px;color:#e8651a;font-weight:900}
.logo span{color:#1c1c1e}
.hinfo h1{font-size:16px;font-weight:700;color:#1c1c1e}
.hinfo p{font-size:11px;color:#9ca3af;margin-top:2px}
.grid{max-width:980px;margin:0 auto;display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.card{background:#fff;border-radius:20px;padding:20px;box-shadow:0 1px 6px rgba(0,0,0,.07)}
.card-label{font-size:13px;font-weight:700;color:#374151;margin-bottom:2px}
.card-desc{font-size:11px;color:#9ca3af;margin-bottom:14px}
.preview-wrap{border-radius:12px;overflow:hidden;background:#e5e7eb}
canvas{display:block;width:100%;height:auto}
.btn{display:block;width:100%;margin-top:12px;padding:11px;background:#e8651a;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;transition:background .15s}
.btn:hover{background:#d4581a}
.loading{text-align:center;padding:80px 20px;color:#9ca3af;font-size:14px;max-width:980px;margin:0 auto}
@media(max-width:680px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<header>
  <div class="logo">fess<span>.jobs</span></div>
  <div class="hinfo">
    <h1>QR Code Export</h1>
    <p>Tutorial · fessjobs.github.io/fess.jobs/tutorial.html</p>
  </div>
</header>

<div class="loading" id="loading">⏳ QR Codes werden generiert…</div>
<div class="grid" id="grid" style="display:none">
  <div class="card">
    <div class="card-label">📸 Instagram Post</div>
    <div class="card-desc">1080 × 1080 px · Quadratisch</div>
    <div class="preview-wrap"><canvas id="c-post"></canvas></div>
    <button class="btn" onclick="dl('c-post','fessjobs_instagram_post.png')">⬇ PNG herunterladen</button>
  </div>
  <div class="card">
    <div class="card-label">📱 Instagram Story</div>
    <div class="card-desc">1080 × 1920 px · Hochformat</div>
    <div class="preview-wrap"><canvas id="c-story"></canvas></div>
    <button class="btn" onclick="dl('c-story','fessjobs_instagram_story.png')">⬇ PNG herunterladen</button>
  </div>
  <div class="card">
    <div class="card-label">💳 Apple Wallet Card</div>
    <div class="card-desc">1024 × 648 px · Querformat</div>
    <div class="preview-wrap"><canvas id="c-wallet"></canvas></div>
    <button class="btn" onclick="dl('c-wallet','fessjobs_apple_wallet.png')">⬇ PNG herunterladen</button>
  </div>
</div>

<script>
const QR_URL = 'https://fessjobs.github.io/fess.jobs/tutorial.html';
const OR = '#e8651a', OR2 = '#c94e0a', DARK = '#1c1c1e';

// Load QR image from API — no JS library needed
function loadQR(size, fg, bg) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    const f = (fg||'#000000').replace('#','');
    const b = (bg||'#ffffff').replace('#','');
    const t = setTimeout(()=>reject(new Error('QR Timeout – Internetverbindung prüfen')), 15000);
    img.onload = ()=>{ clearTimeout(t); resolve(img); };
    img.onerror = ()=>{ clearTimeout(t); reject(new Error('QR konnte nicht geladen werden')); };
    img.src = `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodeURIComponent(QR_URL)}&color=${f}&bgcolor=${b}&ecc=H&margin=1`;
  });
}

function rr(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

// ── INSTAGRAM POST 1080×1080 ──────────────────────────
async function drawPost() {
  const W=1080,H=1080;
  const cv=document.getElementById('c-post');
  cv.width=W; cv.height=H;
  const c=cv.getContext('2d');
  const qr=await loadQR(480,'1c1c1e','ffffff');

  // White background
  c.fillStyle='#fff'; c.fillRect(0,0,W,H);

  // Orange wave header
  const g=c.createLinearGradient(0,0,W,420);
  g.addColorStop(0,OR); g.addColorStop(1,OR2);
  c.fillStyle=g;
  c.beginPath();
  c.moveTo(0,0); c.lineTo(W,0); c.lineTo(W,340);
  c.bezierCurveTo(W*.75,450,W*.25,370,0,430);
  c.closePath(); c.fill();

  // fess.jobs
  c.fillStyle='#fff';
  c.font='bold 108px Bitter,serif';
  c.textAlign='center';
  c.fillText('fess.jobs', W/2, 172);

  // tagline
  c.font='500 38px Inter,sans-serif';
  c.fillStyle='rgba(255,255,255,.88)';
  c.fillText('Dein Weg zu Top-Jobs im Eventbereich', W/2, 240);

  // Tutorial pill
  c.fillStyle='rgba(255,255,255,.22)';
  rr(c,W/2-155,278,310,56,28); c.fill();
  c.fillStyle='#fff';
  c.font='600 26px Inter,sans-serif';
  c.fillText('▶  Tutorial starten', W/2, 314);

  // QR card
  const qrS=480, cx=(W-qrS-80)/2, cy=460;
  c.shadowColor='rgba(0,0,0,.13)'; c.shadowBlur=48; c.shadowOffsetY=10;
  c.fillStyle='#fff';
  rr(c,cx,cy,qrS+80,qrS+80,28); c.fill();
  c.shadowBlur=0; c.shadowOffsetY=0;

  c.strokeStyle=OR; c.lineWidth=5;
  rr(c,cx,cy,qrS+80,qrS+80,28); c.stroke();

  // Corner dots
  [[cx,cy],[cx+qrS+80,cy],[cx,cy+qrS+80],[cx+qrS+80,cy+qrS+80]].forEach(([dx,dy])=>{
    c.fillStyle=OR; c.beginPath(); c.arc(dx,dy,7,0,Math.PI*2); c.fill();
  });

  c.drawImage(qr, cx+40, cy+40, qrS, qrS);

  c.fillStyle='rgba(28,28,30,.35)';
  c.font='600 21px Inter,sans-serif';
  c.fillText('QR Code scannen', W/2, cy+qrS+62);

  // URL
  c.fillStyle='#9ca3af';
  c.font='22px Inter,sans-serif';
  c.fillText('fessjobs.github.io/fess.jobs/tutorial.html', W/2, 1024);

  // Bottom bar
  c.fillStyle=OR; c.fillRect(0,1048,W,32);
  c.fillStyle='#fff';
  c.font='600 16px Inter,sans-serif';
  c.fillText('fess.jobs · Personaldienstleistungen', W/2, 1070);
}

// ── INSTAGRAM STORY 1080×1920 — ORANGE ───────────────
async function drawStory() {
  const W=1080,H=1920;
  const cv=document.getElementById('c-story');
  cv.width=W; cv.height=H;
  const c=cv.getContext('2d');
  const qr=await loadQR(660,'e8651a','ffffff');

  // Full orange gradient background
  const g=c.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#f97316'); g.addColorStop(.45,OR); g.addColorStop(1,'#b84510');
  c.fillStyle=g; c.fillRect(0,0,W,H);

  // Subtle diagonal stripe texture
  c.save(); c.globalAlpha=0.06;
  for(let i=-H;i<W+H;i+=90){
    c.strokeStyle='#fff'; c.lineWidth=40;
    c.beginPath(); c.moveTo(i,0); c.lineTo(i+H,H); c.stroke();
  }
  c.restore();

  // Top white bar
  c.fillStyle='rgba(255,255,255,.18)'; c.fillRect(0,0,W,10);

  // Large background "fess.jobs" watermark
  c.save(); c.globalAlpha=0.07;
  c.fillStyle='#fff';
  c.font='bold 280px Bitter,serif';
  c.textAlign='center';
  c.fillText('fess', W/2, 460);
  c.fillText('.jobs', W/2, 720);
  c.restore();

  // fess.jobs main title
  c.fillStyle='#fff';
  c.font='bold 156px Bitter,serif';
  c.textAlign='center';
  c.fillText('fess.jobs', W/2, 290);

  // tagline
  c.fillStyle='rgba(255,255,255,.85)';
  c.font='500 50px Inter,sans-serif';
  c.fillText('Dein Weg zu Top-Jobs', W/2, 378);

  // White divider
  c.strokeStyle='rgba(255,255,255,.35)'; c.lineWidth=2;
  c.beginPath(); c.moveTo(W/2-220,430); c.lineTo(W/2+220,430); c.stroke();

  // Instruction text
  c.fillStyle='#fff';
  c.font='700 58px Inter,sans-serif';
  c.fillText('Scann den Code &', W/2, 560);
  c.fillText('starte dein Tutorial', W/2, 634);

  // QR card — white card on orange
  const qrS=660, qx=(W-qrS-100)/2, qy=730;
  c.shadowColor='rgba(0,0,0,.25)'; c.shadowBlur=60; c.shadowOffsetY=16;
  c.fillStyle='#fff'; rr(c,qx,qy,qrS+100,qrS+100,40); c.fill();
  c.shadowBlur=0; c.shadowOffsetY=0;

  // Subtle inner border on card
  c.strokeStyle='rgba(232,101,26,.2)'; c.lineWidth=3;
  rr(c,qx,qy,qrS+100,qrS+100,40); c.stroke();

  c.drawImage(qr, qx+50, qy+50, qrS, qrS);

  // "QR Code scannen" below card
  c.fillStyle='rgba(255,255,255,.75)';
  c.font='600 36px Inter,sans-serif';
  c.fillText('QR Code scannen', W/2, qy+qrS+108);

  // URL pill — white on orange
  c.fillStyle='rgba(255,255,255,.2)';
  rr(c,W/2-310,1618,620,68,34); c.fill();
  c.strokeStyle='rgba(255,255,255,.5)'; c.lineWidth=2;
  rr(c,W/2-310,1618,620,68,34); c.stroke();
  c.fillStyle='#fff';
  c.font='600 30px Inter,sans-serif';
  c.fillText('fess.jobs/tutorial', W/2, 1661);

  // CTA button — white with orange text
  c.fillStyle='#fff'; rr(c,W/2-230,1720,460,90,45); c.fill();
  c.fillStyle=OR;
  c.font='bold 38px Inter,sans-serif';
  c.fillText('▶  Jetzt starten', W/2, 1773);

  // Footer
  c.fillStyle='rgba(255,255,255,.5)';
  c.font='26px Inter,sans-serif';
  c.fillText('fess.jobs · Personaldienstleistungen', W/2, 1862);
  c.fillStyle='rgba(255,255,255,.2)'; c.fillRect(0,H-10,W,10);
}

// ── APPLE WALLET 1024×648 ─────────────────────────────
async function drawWallet() {
  const W=1024,H=648;
  const cv=document.getElementById('c-wallet');
  cv.width=W; cv.height=H;
  const c=cv.getContext('2d');
  const qr=await loadQR(310,'ffffff','242428');

  // Dark base
  c.fillStyle=DARK; c.fillRect(0,0,W,H);
  c.fillStyle='rgba(255,255,255,.022)';
  for(let x=0;x<W;x+=26) for(let y=0;y<H;y+=26){ c.beginPath(); c.arc(x,y,1,0,Math.PI*2); c.fill(); }

  // Orange left panel with curved right edge
  const og=c.createLinearGradient(0,0,370,H);
  og.addColorStop(0,OR); og.addColorStop(1,OR2);
  c.fillStyle=og;
  c.beginPath();
  c.moveTo(0,0); c.lineTo(355,0);
  c.bezierCurveTo(400,H*.28,400,H*.72,355,H);
  c.lineTo(0,H); c.closePath(); c.fill();

  // Pass label top-left
  c.fillStyle='rgba(255,255,255,.5)';
  c.font='700 15px Inter,sans-serif';
  c.textAlign='left';
  c.fillText('MITARBEITER-PORTAL', 34, 58);
  c.fillStyle='rgba(255,255,255,.3)';
  c.font='12px Inter,sans-serif';
  c.fillText('fess.jobs', 34, 78);

  // fess.jobs main text
  c.fillStyle='#fff';
  c.font='bold 84px Bitter,serif';
  c.textAlign='center';
  c.fillText('fess.jobs', 170, 216);

  // Divider
  c.strokeStyle='rgba(255,255,255,.25)'; c.lineWidth=1;
  c.beginPath(); c.moveTo(34,244); c.lineTo(306,244); c.stroke();

  c.fillStyle='rgba(255,255,255,.75)';
  c.font='500 21px Inter,sans-serif';
  c.fillText('Personaldienstleistungen', 170, 272);

  c.fillStyle='rgba(255,255,255,.5)';
  c.font='500 18px Inter,sans-serif';
  c.fillText('Scann für Tutorial →', 170, 336);

  // QR on right
  const qrS=310, qx=452+(W-452-qrS)/2, qy=(H-qrS-56)/2;
  c.shadowColor=OR; c.shadowBlur=36;
  c.fillStyle='#28282e'; rr(c,qx-18,qy-18,qrS+36,qrS+36,18); c.fill();
  c.shadowBlur=0;
  c.strokeStyle=OR; c.lineWidth=3;
  rr(c,qx-18,qy-18,qrS+36,qrS+36,18); c.stroke();
  c.drawImage(qr, qx, qy, qrS, qrS);

  c.fillStyle='rgba(255,255,255,.38)';
  c.font='600 17px Inter,sans-serif';
  c.fillText('Tutorial starten', qx+qrS/2, qy+qrS+32);

  // Footer strip
  const sg=c.createLinearGradient(0,H-50,0,H);
  sg.addColorStop(0,'rgba(28,28,30,0)'); sg.addColorStop(1,'rgba(28,28,30,.85)');
  c.fillStyle=sg; c.fillRect(0,H-50,W,50);
  c.fillStyle=OR; c.fillRect(0,H-4,W,4);
  c.fillStyle='rgba(255,255,255,.2)';
  c.font='13px Inter,sans-serif';
  c.textAlign='center';
  c.fillText('fess.jobs · fessjobs.github.io/fess.jobs/tutorial.html', W/2, H-12);
}

function dl(id, name) {
  try {
    const a=document.createElement('a');
    a.download=name;
    a.href=document.getElementById(id).toDataURL('image/png');
    a.click();
  } catch(e) {
    alert('Download nicht möglich (CORS). Bitte Screenshot verwenden oder im Desktop-Browser öffnen.');
  }
}

async function init() {
  try {
    await Promise.race([document.fonts.ready, new Promise(r=>setTimeout(r,2500))]);
    await Promise.all([drawPost(), drawStory(), drawWallet()]);
    document.getElementById('loading').style.display='none';
    document.getElementById('grid').style.display='grid';
  } catch(e) {
    document.getElementById('loading').innerHTML =
      `<div style="color:#dc2626;font-weight:700">⚠️ Fehler</div><div style="margin-top:8px;font-size:13px">${e.message}</div>
       <div style="margin-top:12px;font-size:12px;color:#6b7280">Bitte Internetverbindung prüfen und Seite neu laden.</div>`;
  }
}

init();
</script>
</body>
</html>
