<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Stundennachweis – fess.jobs</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#E8651A">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bitter:wght@700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --or:#E8651A;--or-dark:#d4580f;--or-light:#fff4ee;
  --bg:#fff;--surface:#f4f5f7;--border:#e5e7eb;
  --text:#111827;--muted:#6b7280;
  --green:#059669;--green-bg:#ecfdf5;--green-border:#a7f3d0;
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif}
body{padding-bottom:32px}

/* top bar */
#topbar{height:3px;background:var(--or)}

/* header */
#hdr{
  background:#fff;border-bottom:1px solid var(--border);
  padding:12px 16px 10px;
  position:sticky;top:3px;z-index:50;
}
#hdr-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:0}
.fess-logo{font-family:'Bitter',serif;font-size:16px;font-weight:900;color:var(--or)}
#page-title{font-size:12px;font-weight:600;color:var(--muted);margin-top:1px}

/* lang switcher */
#lang-sw{display:flex;gap:4px}
.lb{
  font-size:11px;font-weight:700;
  padding:4px 9px;border-radius:16px;
  border:1.5px solid var(--border);
  background:#fff;color:var(--muted);
  cursor:pointer;transition:all .15s;
  font-family:'Barlow',sans-serif;
}
.lb.on{background:var(--or);color:#fff;border-color:var(--or)}

/* main */
#main{padding:20px 16px 0;max-width:480px;margin:0 auto}

/* section */
.section{margin-bottom:20px}
.section-label{
  font-size:10px;font-weight:700;
  text-transform:uppercase;letter-spacing:.09em;
  color:var(--or);margin-bottom:10px;
}

/* field */
.field{margin-bottom:12px}
.field label{
  display:block;font-size:12px;font-weight:600;
  color:var(--text);margin-bottom:5px;
}
.field input,.field textarea,.field select{
  width:100%;padding:11px 13px;
  border:1.5px solid var(--border);border-radius:10px;
  font-size:14px;font-family:'Barlow',sans-serif;
  color:var(--text);background:#fff;
  outline:none;transition:border .15s;
  -webkit-appearance:none;appearance:none;
}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--or)}
.field textarea{resize:none;min-height:72px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* calc display */
#calc-result{
  display:none;
  background:var(--or-light);border:1.5px solid rgba(232,101,26,.3);
  border-radius:10px;padding:13px 15px;
  margin-bottom:4px;
}
#calc-result.vis{display:flex;align-items:center;justify-content:space-between}
.calc-label{font-size:12px;font-weight:600;color:var(--or-dark)}
.calc-value{font-family:'Bitter',serif;font-size:22px;font-weight:900;color:var(--or)}

/* submit btn */
#submit-btn{
  width:100%;padding:14px;
  background:var(--or);color:#fff;
  font-family:'Bitter',serif;font-size:15px;font-weight:800;
  border:none;border-radius:12px;cursor:pointer;
  box-shadow:0 4px 18px rgba(232,101,26,.35);
  transition:all .15s;margin-bottom:6px;
}
#submit-btn:hover{background:var(--or-dark);transform:translateY(-1px)}
#submit-btn:active{transform:translateY(0)}

/* RECEIPT */
#receipt{display:none;padding:20px 16px;max-width:480px;margin:0 auto}
#receipt.vis{display:block}
#form-wrap.hide{display:none}

.receipt-card{
  border:1.5px solid var(--border);border-radius:16px;
  overflow:hidden;
  box-shadow:0 4px 24px rgba(0,0,0,.07);
  margin-bottom:16px;
}
.receipt-head{
  background:var(--or);color:#fff;
  padding:18px 20px;
  display:flex;align-items:center;justify-content:space-between;
}
.receipt-brand{font-family:'Bitter',serif;font-size:17px;font-weight:900}
.receipt-sub{font-size:11px;opacity:.85;margin-top:2px}
.receipt-badge{
  background:rgba(255,255,255,.2);
  border-radius:8px;padding:4px 10px;
  font-size:11px;font-weight:700;letter-spacing:.04em;
  font-family:'Barlow',sans-serif;
}

.receipt-body{padding:18px 20px}

.rrow{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 0;border-bottom:1px solid var(--border);
}
.rrow:last-child{border-bottom:none}
.rkey{font-size:12px;font-weight:600;color:var(--muted)}
.rval{font-size:13px;font-weight:700;color:var(--text);text-align:right;max-width:60%}

.receipt-total{
  background:var(--surface);
  border-top:2px solid var(--or);
  padding:14px 20px;
  display:flex;align-items:center;justify-content:space-between;
}
.total-label{font-family:'Bitter',serif;font-size:14px;font-weight:800;color:var(--text)}
.total-value{font-family:'Bitter',serif;font-size:26px;font-weight:900;color:var(--or)}

/* action buttons */
.action-row{display:flex;gap:10px;margin-bottom:10px}
.action-btn{
  flex:1;padding:12px;border-radius:10px;
  font-family:'Barlow',sans-serif;font-size:13px;font-weight:700;
  border:1.5px solid;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:7px;
  transition:all .15s;
}
.btn-wa{background:#25D366;color:#fff;border-color:#25D366}
.btn-wa:hover{background:#1eb358}
.btn-print{background:#fff;color:var(--text);border-color:var(--border)}
.btn-print:hover{background:var(--surface)}

.btn-new{
  width:100%;padding:13px;
  background:#fff;color:var(--muted);
  border:1.5px solid var(--border);border-radius:10px;
  font-family:'Barlow',sans-serif;font-size:13px;font-weight:600;
  cursor:pointer;transition:all .15s;
}
.btn-new:hover{border-color:var(--or);color:var(--or)}

/* history */
#history-section{margin-top:24px;padding:0 16px 32px;max-width:480px;margin-left:auto;margin-right:auto}
.hist-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-bottom:10px}
.hist-card{
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:11px 13px;margin-bottom:8px;
  display:flex;align-items:center;justify-content:space-between;
  gap:10px;
}
.hist-left .hist-event{font-size:13px;font-weight:700;color:var(--text)}
.hist-left .hist-date{font-size:11px;color:var(--muted);margin-top:1px}
.hist-hours{font-family:'Bitter',serif;font-size:18px;font-weight:900;color:var(--or)}
.hist-unit{font-size:10px;font-weight:600;color:var(--muted);display:block;text-align:right}

/* print */
@media print{
  #topbar,#hdr,#form-wrap,#history-section,.action-row,.btn-new,#lang-sw{display:none!important}
  #receipt{display:block!important;padding:0}
  .receipt-card{box-shadow:none;border:1px solid #ccc}
  body{padding:0}
}

/* RTL */
[dir="rtl"] .receipt-head{flex-direction:row-reverse}
[dir="rtl"] .rval{text-align:left}
[dir="rtl"] .receipt-total{flex-direction:row-reverse}
[dir="rtl"] .hist-card{flex-direction:row-reverse}
[dir="rtl"] .hist-hours{text-align:left}
[dir="rtl"] .calc-value{text-align:left}
</style>
</head>
<body>

<div id="topbar"></div>

<div id="hdr">
  <div id="hdr-row">
    <div>
      <div class="fess-logo">FESS</div>
      <div id="page-title" data-i18n="page_title">Stundennachweis</div>
    </div>
    <div id="lang-sw">
      <button class="lb on" onclick="setLang('de')">DE</button>
      <button class="lb" onclick="setLang('en')">EN</button>
      <button class="lb" onclick="setLang('ar')">AR</button>
    </div>
  </div>
</div>

<!-- FORM -->
<div id="form-wrap">
  <div id="main">

    <div class="section">
      <div class="section-label" data-i18n="sec_person">Person</div>
      <div class="field">
        <label data-i18n="lbl_name">Name</label>
        <input type="text" id="f-name" autocomplete="name" placeholder="Max Mustermann">
      </div>
    </div>

    <div class="section">
      <div class="section-label" data-i18n="sec_event">Einsatz</div>
      <div class="field">
        <label data-i18n="lbl_event">Veranstaltung</label>
        <input type="text" id="f-event" placeholder="Rock am Ring">
      </div>
      <div class="field">
        <label data-i18n="lbl_location">Ort</label>
        <input type="text" id="f-location" placeholder="Nürburgring">
      </div>
      <div class="field">
        <label data-i18n="lbl_role">Tätigkeit</label>
        <input type="text" id="f-role" placeholder="Stagehand">
      </div>
      <div class="field">
        <label data-i18n="lbl_date">Datum</label>
        <input type="date" id="f-date">
      </div>
    </div>

    <div class="section">
      <div class="section-label" data-i18n="sec_times">Zeiten</div>
      <div class="field-row">
        <div class="field">
          <label data-i18n="lbl_start">Schichtbeginn</label>
          <input type="time" id="f-start" oninput="calcHours()">
        </div>
        <div class="field">
          <label data-i18n="lbl_end">Schichtende</label>
          <input type="time" id="f-end" oninput="calcHours()">
        </div>
      </div>
      <div class="field">
        <label data-i18n="lbl_break">Pause (Minuten)</label>
        <input type="number" id="f-break" value="30" min="0" max="480" oninput="calcHours()">
      </div>

      <div id="calc-result">
        <span class="calc-label" data-i18n="calc_net">Nettoarbeitszeit</span>
        <span class="calc-value" id="calc-val">–</span>
      </div>
    </div>

    <div class="section">
      <div class="section-label" data-i18n="sec_notes">Notizen (optional)</div>
      <div class="field">
        <textarea id="f-notes" rows="3" placeholder=""></textarea>
      </div>
    </div>

    <button id="submit-btn" onclick="submitForm()" data-i18n="btn_submit">Schicht erfassen →</button>

  </div>
</div>

<!-- RECEIPT -->
<div id="receipt">
  <div class="receipt-card">
    <div class="receipt-head">
      <div>
        <div class="receipt-brand">FESS Crew</div>
        <div class="receipt-sub" data-i18n="receipt_title">Stundennachweis</div>
      </div>
      <div class="receipt-badge" data-i18n="receipt_badge">Nachweis</div>
    </div>
    <div class="receipt-body">
      <div class="rrow"><span class="rkey" data-i18n="lbl_name">Name</span><span class="rval" id="r-name">–</span></div>
      <div class="rrow"><span class="rkey" data-i18n="lbl_date">Datum</span><span class="rval" id="r-date">–</span></div>
      <div class="rrow"><span class="rkey" data-i18n="lbl_event">Veranstaltung</span><span class="rval" id="r-event">–</span></div>
      <div class="rrow"><span class="rkey" data-i18n="lbl_location">Ort</span><span class="rval" id="r-loc">–</span></div>
      <div class="rrow"><span class="rkey" data-i18n="lbl_role">Tätigkeit</span><span class="rval" id="r-role">–</span></div>
      <div class="rrow"><span class="rkey" data-i18n="lbl_start">Beginn</span><span class="rval" id="r-start">–</span></div>
      <div class="rrow"><span class="rkey" data-i18n="lbl_end">Ende</span><span class="rval" id="r-end">–</span></div>
      <div class="rrow"><span class="rkey" data-i18n="lbl_break">Pause</span><span class="rval" id="r-break">–</span></div>
      <div class="rrow" id="r-notes-row" style="display:none">
        <span class="rkey" data-i18n="sec_notes">Notizen</span>
        <span class="rval" id="r-notes">–</span>
      </div>
    </div>
    <div class="receipt-total">
      <span class="total-label" data-i18n="total_label">Nettoarbeitszeit</span>
      <span class="total-value" id="r-total">–</span>
    </div>
  </div>

  <div class="action-row">
    <button class="action-btn btn-wa" onclick="sendWA()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.134.558 4.133 1.535 5.865L.057 23.428a.5.5 0 0 0 .614.614l5.563-1.478A11.95 11.95 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22a9.944 9.944 0 0 1-5.073-1.389l-.364-.216-3.768 1 1.017-3.696-.237-.381A9.944 9.944 0 0 1 2 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>
      <span data-i18n="btn_wa">Per WhatsApp</span>
    </button>
    <button class="action-btn btn-print" onclick="window.print()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
      <span data-i18n="btn_print">Drucken / PDF</span>
    </button>
  </div>
  <button class="btn-new" onclick="resetForm()" data-i18n="btn_new">+ Neue Schicht erfassen</button>
</div>

<!-- HISTORY -->
<div id="history-section" style="display:none">
  <div class="hist-label" data-i18n="hist_title">Letzte Einträge</div>
  <div id="hist-list"></div>
</div>

<script>
// ── TRANSLATIONS ────────────────────────────────
const T = {
  de: {
    page_title:'Stundennachweis',
    sec_person:'Person',
    sec_event:'Einsatz',
    sec_times:'Zeiten',
    sec_notes:'Notizen (optional)',
    lbl_name:'Name',
    lbl_event:'Veranstaltung',
    lbl_location:'Ort',
    lbl_role:'Tätigkeit',
    lbl_date:'Datum',
    lbl_start:'Schichtbeginn',
    lbl_end:'Schichtende',
    lbl_break:'Pause (Minuten)',
    calc_net:'Nettoarbeitszeit',
    btn_submit:'Schicht erfassen →',
    receipt_title:'Stundennachweis',
    receipt_badge:'Nachweis',
    total_label:'Nettoarbeitszeit',
    btn_wa:'Per WhatsApp',
    btn_print:'Drucken / PDF',
    btn_new:'+ Neue Schicht erfassen',
    hist_title:'Letzte Einträge',
    err_fill:'Bitte Name, Veranstaltung, Beginn und Ende ausfüllen.',
    err_time:'Schichtende muss nach Schichtbeginn liegen.',
    ph_event:'Rock am Ring',
    ph_loc:'Nürburgring',
    ph_role:'Stagehand',
    ph_name:'Max Mustermann',
    ph_notes:'',
    break_unit:'Min.',
    wa_msg:'FESS Stundennachweis\n\nName: {name}\nDatum: {date}\nEinsatz: {event}, {loc}\nTätigkeit: {role}\nBeginn: {start}\nEnde: {end}\nPause: {brk} Min.\nNettoarbeitszeit: {total}\n\nGesendet via fess.jobs',
  },
  en: {
    page_title:'Timesheet',
    sec_person:'Person',
    sec_event:'Deployment',
    sec_times:'Times',
    sec_notes:'Notes (optional)',
    lbl_name:'Name',
    lbl_event:'Event',
    lbl_location:'Location',
    lbl_role:'Role',
    lbl_date:'Date',
    lbl_start:'Shift start',
    lbl_end:'Shift end',
    lbl_break:'Break (minutes)',
    calc_net:'Net working time',
    btn_submit:'Submit shift →',
    receipt_title:'Timesheet',
    receipt_badge:'Record',
    total_label:'Net working time',
    btn_wa:'Send via WhatsApp',
    btn_print:'Print / Save PDF',
    btn_new:'+ Record new shift',
    hist_title:'Recent entries',
    err_fill:'Please fill in name, event, start and end time.',
    err_time:'Shift end must be after shift start.',
    ph_event:'Rock am Ring',
    ph_loc:'Nürburgring',
    ph_role:'Stagehand',
    ph_name:'Max Mustermann',
    ph_notes:'',
    break_unit:'min.',
    wa_msg:'FESS Timesheet\n\nName: {name}\nDate: {date}\nEvent: {event}, {loc}\nRole: {role}\nStart: {start}\nEnd: {end}\nBreak: {brk} min.\nNet working time: {total}\n\nSent via fess.jobs',
  },
  ar: {
    page_title:'سجل الساعات',
    sec_person:'الشخص',
    sec_event:'المهمة',
    sec_times:'الأوقات',
    sec_notes:'ملاحظات (اختياري)',
    lbl_name:'الاسم',
    lbl_event:'الفعالية',
    lbl_location:'الموقع',
    lbl_role:'المنصب',
    lbl_date:'التاريخ',
    lbl_start:'بداية الوردية',
    lbl_end:'نهاية الوردية',
    lbl_break:'استراحة (دقائق)',
    calc_net:'صافي ساعات العمل',
    btn_submit:'تسجيل الوردية ←',
    receipt_title:'سجل الساعات',
    receipt_badge:'إيصال',
    total_label:'صافي ساعات العمل',
    btn_wa:'إرسال عبر واتساب',
    btn_print:'طباعة / حفظ PDF',
    btn_new:'+ تسجيل وردية جديدة',
    hist_title:'الإدخالات الأخيرة',
    err_fill:'يرجى ملء الاسم والفعالية ووقت البداية والنهاية.',
    err_time:'يجب أن يكون وقت نهاية الوردية بعد وقت البداية.',
    ph_event:'Rock am Ring',
    ph_loc:'Nürburgring',
    ph_role:'Stagehand',
    ph_name:'Max Mustermann',
    ph_notes:'',
    break_unit:'د.',
    wa_msg:'سجل ساعات FESS\n\nالاسم: {name}\nالتاريخ: {date}\nالفعالية: {event}، {loc}\nالمنصب: {role}\nالبداية: {start}\nالنهاية: {end}\nالاستراحة: {brk} دقيقة\nصافي ساعات العمل: {total}\n\nأُرسل عبر fess.jobs',
  }
};

let lang = 'de';

function setLang(l) {
  lang = l;
  document.documentElement.lang = l;
  document.documentElement.dir = l === 'ar' ? 'rtl' : 'ltr';
  document.querySelectorAll('.lb').forEach(b => b.classList.toggle('on', b.textContent.toLowerCase() === l));
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.dataset.i18n;
    if (T[l][k] !== undefined) {
      if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') el.placeholder = T[l]['ph_' + el.id.replace('f-','')]||'';
      else el.textContent = T[l][k];
    }
  });
  // update button
  document.getElementById('submit-btn').textContent = T[l].btn_submit;
}

// ── DATE DEFAULT ─────────────────────────────────
document.getElementById('f-date').valueAsDate = new Date();

// ── HOUR CALCULATION ─────────────────────────────
function calcHours() {
  const s = document.getElementById('f-start').value;
  const e = document.getElementById('f-end').value;
  const brk = parseInt(document.getElementById('f-break').value) || 0;
  const res = document.getElementById('calc-result');
  const val = document.getElementById('calc-val');

  if (!s || !e) { res.classList.remove('vis'); return; }

  const [sh,sm] = s.split(':').map(Number);
  const [eh,em] = e.split(':').map(Number);
  let total = (eh * 60 + em) - (sh * 60 + sm) - brk;
  if (total <= 0) { res.classList.remove('vis'); return; }

  const h = Math.floor(total / 60);
  const m = total % 60;
  val.textContent = h + ':' + String(m).padStart(2,'0') + ' Std.';
  res.classList.add('vis');
}

// ── FORM SUBMIT ──────────────────────────────────
function submitForm() {
  const name = document.getElementById('f-name').value.trim();
  const event = document.getElementById('f-event').value.trim();
  const loc = document.getElementById('f-location').value.trim();
  const role = document.getElementById('f-role').value.trim();
  const date = document.getElementById('f-date').value;
  const start = document.getElementById('f-start').value;
  const end = document.getElementById('f-end').value;
  const brk = parseInt(document.getElementById('f-break').value) || 0;
  const notes = document.getElementById('f-notes').value.trim();

  if (!name || !event || !start || !end) {
    alert(T[lang].err_fill); return;
  }

  const [sh,sm] = start.split(':').map(Number);
  const [eh,em] = end.split(':').map(Number);
  let net = (eh * 60 + em) - (sh * 60 + sm) - brk;
  if (net <= 0) { alert(T[lang].err_time); return; }

  const h = Math.floor(net / 60);
  const m = net % 60;
  const totalStr = h + ':' + String(m).padStart(2,'0') + ' Std.';

  // format date
  const d = new Date(date + 'T00:00:00');
  const dateStr = d.toLocaleDateString(lang === 'en' ? 'en-GB' : lang === 'ar' ? 'ar-SA' : 'de-DE', {
    day:'2-digit', month:'2-digit', year:'numeric'
  });

  // fill receipt
  document.getElementById('r-name').textContent = name;
  document.getElementById('r-date').textContent = dateStr;
  document.getElementById('r-event').textContent = event;
  document.getElementById('r-loc').textContent = loc || '–';
  document.getElementById('r-role').textContent = role || '–';
  document.getElementById('r-start').textContent = start + ' Uhr';
  document.getElementById('r-end').textContent = end + ' Uhr';
  document.getElementById('r-break').textContent = brk + ' ' + T[lang].break_unit;
  document.getElementById('r-total').textContent = totalStr;
  if (notes) {
    document.getElementById('r-notes').textContent = notes;
    document.getElementById('r-notes-row').style.display = 'flex';
  } else {
    document.getElementById('r-notes-row').style.display = 'none';
  }

  // store for WhatsApp
  window._entry = { name, event, loc, role, date: dateStr, start, end, brk, totalStr, notes };

  // save to history
  saveHistory({ name, event, date: dateStr, totalStr });

  // show receipt
  document.getElementById('form-wrap').classList.add('hide');
  document.getElementById('receipt').classList.add('vis');
  window.scrollTo(0,0);
}

function sendWA() {
  const e = window._entry;
  if (!e) return;
  const msg = T[lang].wa_msg
    .replace('{name}', e.name)
    .replace('{date}', e.date)
    .replace('{event}', e.event)
    .replace('{loc}', e.loc || '–')
    .replace('{role}', e.role || '–')
    .replace('{start}', e.start)
    .replace('{end}', e.end)
    .replace('{brk}', e.brk)
    .replace('{total}', e.totalStr);
  window.open('https://wa.me/?text=' + encodeURIComponent(msg), '_blank');
}

function resetForm() {
  document.getElementById('form-wrap').classList.remove('hide');
  document.getElementById('receipt').classList.remove('vis');
  document.getElementById('calc-result').classList.remove('vis');
  document.getElementById('f-date').valueAsDate = new Date();
  window.scrollTo(0,0);
  renderHistory();
}

// ── HISTORY ──────────────────────────────────────
function saveHistory(entry) {
  let hist = JSON.parse(localStorage.getItem('fess_hours') || '[]');
  hist.unshift(entry);
  hist = hist.slice(0, 10);
  localStorage.setItem('fess_hours', JSON.stringify(hist));
}

function renderHistory() {
  const hist = JSON.parse(localStorage.getItem('fess_hours') || '[]');
  const sec = document.getElementById('history-section');
  const list = document.getElementById('hist-list');
  if (!hist.length) { sec.style.display = 'none'; return; }
  sec.style.display = 'block';
  list.innerHTML = hist.map(e => `
    <div class="hist-card">
      <div class="hist-left">
        <div class="hist-event">${e.event}</div>
        <div class="hist-date">${e.date} · ${e.name}</div>
      </div>
      <div>
        <div class="hist-hours">${e.totalStr.replace(' Std.','')}</div>
        <span class="hist-unit">Std.</span>
      </div>
    </div>
  `).join('');
}

renderHistory();
</script>
</body>
</html>
